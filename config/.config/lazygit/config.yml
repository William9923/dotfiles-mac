customCommands:
  - key: "C"
    command: "git cz"
    description: "commit with commitizen"
    context: "files"
    loadingText: "opening commitizen commit tool"
    output: terminal
git:
  paging:
    colorArg: never
    pager: delta --dark --paging=never
gui:
  theme:
    selectedLineByColor:
      - underline
    selectedRangeByColor:
      - underline
  showIcons: true
os:
 editCommand: 'vim'
 editCommandTemplate: '{{editor}} +{{line}} -- {{filename}}'
