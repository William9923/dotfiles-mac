customCommands:
  - key: "C"
    command: "git cz"
    description: "commit with commitizen"
    context: "files"
    loadingText: "opening commitizen commit tool"
    output: terminal
git:
  pagers:
    - useExternalDiffGitConfig: true
    - colorArg: never
      pager: delta --dark --paging=never
gui:
  theme:
    activeBorderColor:
      - blue
      - bold
    inactiveBorderColor:
      - white
    selectedLineBgColor:
      - black
    optionsTextColor:
      - cyan
    unstagedChangesColor:
      - yellow
    cherryPickedCommitBgColor:
      - cyan
    markedBaseCommitBgColor:
      - yellow
    defaultFgColor:
      - default
  nerdFontsVersion: "3"
os:
  editPreset: 'nvim'
  edit: 'nvim {{filename}}'
  editAtLine: 'nvim +{{line}} {{filename}}'
  editAtLineAndWait: 'nvim +{{line}} {{filename}}'
  editInTerminal: true
  open: 'open {{filename}}'
  openDirInEditor: 'nvim {{dir}}'
