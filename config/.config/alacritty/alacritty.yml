## Import files (Colors, Fonts, Etc)
import:
  - ~/.config/alacritty/colors.yml

## Set environment variables
env:
  WINIT_X11_SCALE_FACTOR: '1.0'
  TERM: xterm-256color

font:
  normal:
    family: 'JetbrainsMono Nerd Font'
    style: Medium
  size: 15.0

scrolling:
  history: 1000
  multiplier: 3

## Terminal window settings
window:
  dimensions:
    columns: 82
    lines: 24

  padding:
    x: 6
    y: 6

  decorations: full
  startup_mode: Windowed
  dynamic_title: true

  ## Background opacity
  opacity: 0.95

## Cursor
cursor:
  style:
    shape: Block
    blinking: On

  unfocused_hollow: false

## Live config reload
live_config_reload: true

# Shell
shell:
  program: /bin/zsh
  args:
    - --login

# Selection
selection:
  semantic_escape_chars: ",│`|:\"' ()[]{}<>\t"
  save_to_clipboard: true

key_bindings:
  - {key: Return, mods: Super|Shift, action: SpawnNewInstance}
  - {key: Left, mods: Alt, chars: "\eb"}
  - {key: Right, mods: Alt, chars: "\ef"}
