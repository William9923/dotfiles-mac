# statusbar
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#5eacd3'
set -g status-interval 5
set -g status-left '#[fg=#5eacd3,bold]#S #[fg=#555555]| '
set -g status-right '#[fg=#555555]#{?client_prefix,#[fg=#5eacd3]prefix #[fg=#555555]| ,}%H:%M'
set -g status-right-length 50
set -g status-left-length 30

setw -g window-status-current-style 'fg=#5eacd3 bg=#333333 bold'
setw -g window-status-current-format ' #I:#W#F '

setw -g window-status-style 'fg=colour1 dim'
setw -g window-status-format ' #[fg=#5eacd3]#I:#W#F '

# messages
set -g message-style 'fg=colour2 bg=colour0 bold'
