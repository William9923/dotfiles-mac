# Display lazygit
bind -r g display-popup -d '#{pane_current_path}' -w 95% -h 95% -E lazygit

# Toggle an agent session in a popup, scoped to current pane's cwd.
# Session prefix `agent-` MUST match the pattern below for toggle-off to work.
# NOTE: overrides tmux-yank's `prefix y` (copy-line). For that to take
# effect, utility.conf MUST be sourced after `run tpm` in tmux.conf.
bind -r y if-shell -F '#{m:agent-*,#{session_name}}' \
    'detach-client' \
    "run-shell '~/.config/tmux/scripts/popup-session.sh pi \"#{pane_current_path}\" pi'"
