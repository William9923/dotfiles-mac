# Set default shell as zsh
set-option -g default-command /bin/zsh

set-option -g history-limit 3000
set -g mouse on

set -s escape-time 0

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

source ~/.config/tmux/keybind.conf
source ~/.config/tmux/theme.conf
source ~/.config/tmux/statusline.conf

if-shell "uname -s | grep -q Darwin" "source ~/.config/tmux/macos.conf"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
run '~/.tmux/plugins/tpm/tpm'

# utility.conf is sourced AFTER `run tpm` so our custom bindings (e.g. `y`)
# take precedence over plugin defaults. tmux-yank, for example, claims
# `prefix y` for copy-line — sourcing this earlier would let the plugin
# silently overwrite our binding.
source ~/.config/tmux/utility.conf
